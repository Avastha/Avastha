<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avastha — Materials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --gold:      #c9a96e;
      --gold-dim:  #7a6040;
      --text:      #e8e2d9;
      --muted:     #7a7570;
      --radius:    12px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: .5;
    }

    /* ── HEADER ── */
    header {
      padding: 64px 40px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      line-height: 1;
    }

    .tagline {
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── PRESS KIT BUTTON ── */
    .press-kit-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .25s, border-color .25s, box-shadow .25s, transform .2s;
      white-space: nowrap;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .press-kit-btn:hover {
      background: rgba(201,169,110,0.08);
      border-color: var(--gold);
      box-shadow: 0 4px 24px rgba(201,169,110,0.15);
      transform: translateY(-2px);
    }

    .press-kit-btn svg {
      width: 14px; height: 14px;
      fill: var(--gold);
      flex-shrink: 0;
    }

    /* ── NAV DOTS ── */
    .nav {
      display: flex;
      gap: 24px;
      padding: 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .nav a {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .nav a::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      transition: background .2s;
    }
    .nav a:hover, .nav a.active { color: var(--gold); }
    .nav a:hover::before, .nav a.active::before { background: var(--gold); }

    /* ── MAIN ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── SECTION ── */
    section { padding: 60px 0 40px; }
    section + section { border-top: 1px solid var(--border); }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 40px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .section-count {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold);
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── LOADING / ERROR ── */
    .state-msg {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .state-msg.error { color: #c06060; }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SHARED CARD GRID ── */
    .logos-grid,
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── LOGO CARD — same look as photo card ── */
    .logo-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
      background: var(--surface);
      aspect-ratio: 4/3;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
    }

    .logo-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }

    .logo-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 28px;
      transition: transform .4s;
    }

    .logo-card:hover img { transform: scale(1.05); }

    .logo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 52%);
      display: flex;
      align-items: flex-end;
      padding: 14px;
      pointer-events: none;
    }

    .logo-overlay-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      pointer-events: auto;
    }

    .logo-name {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      word-break: break-word;
      flex: 1;
      padding-right: 10px;
    }

    /* ── PHOTO CARD ── */
    .photo-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
      background: var(--surface);
      aspect-ratio: 4/3;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
    }

    .photo-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s;
    }

    .photo-card:hover img { transform: scale(1.04); }

    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      opacity: 0;
      transition: opacity .25s;
    }

    .photo-card:hover .photo-overlay { opacity: 1; }

    .photo-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .photo-name {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      word-break: break-all;
      flex: 1;
    }

    /* ── SHARED DOWNLOAD ICON ── */
    .dl-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(201,169,110,0.9);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .dl-icon svg { width: 14px; height: 14px; fill: #0d0d0d; }

    /* ── MEDIA / SOCIAL — no frame, just icons ── */
    .media-banner {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px 20px;
      align-items: start;
      padding: 4px 0 8px;
    }

    .media-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      transition: color .25s, transform .25s;
      animation: fadeUp .4s ease both;
    }

    .media-item:hover {
      color: var(--gold);
      transform: translateY(-4px);
    }

    .media-icon-wrap {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-icon-wrap img {
      width: 72%;
      height: 72%;
      object-fit: contain;
      filter: grayscale(20%) brightness(0.88);
      transition: filter .25s, transform .25s;
    }

    .media-item:hover .media-icon-wrap img {
      filter: grayscale(0%) brightness(1.1);
      transform: scale(1.08);
    }

    .media-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 40px 20px 32px; flex-direction: column; gap: 24px; }
      .press-kit-btn { align-self: flex-start; }
      .nav { padding: 16px 20px; gap: 16px; flex-wrap: wrap; }
      main { padding: 0 16px 60px; }
      .logos-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .photos-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .photo-card { aspect-ratio: 1; }
      .logo-card  { aspect-ratio: 1; }
      .photo-overlay { opacity: 1; }
      footer { padding: 24px 20px; }
      .media-banner { grid-template-columns: repeat(3, 1fr); gap: 6px 12px; }
      .media-label { font-size: 9px; letter-spacing: 0.1em; }
      #media .section-header { margin-bottom: 24px; }
      section { padding: 40px 0 32px; }
    }

    @media (max-width: 480px) {
      .photos-grid { grid-template-columns: 1fr; }
      .logos-grid  { grid-template-columns: 1fr 1fr; gap: 10px; }
    }

    /* ── FADE-IN ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

      <div class="brand">Ava<span>stha</span></div>

    <a
      class="press-kit-btn"

      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    const REPO_OWNER  = 'Avastha';
    const REPO_NAME   = 'Avastha';
    const BRANCH      = 'main';
    const LOGOS_PATH  = 'Materials/Logos';
    const IMAGES_PATH = 'Materials/Images';

    const IMAGE_EXTS = ['.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp','.tiff','.ico'];
    function isImage(name) { return IMAGE_EXTS.some(e => name.toLowerCase().endsWith(e)); }
    function rawUrl(file) { return file.download_url; }
    function baseName(name) { return name.replace(/\.[^/.]+$/, ''); }

    const dlIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
    </svg>`;

    async function fetchFiles(path) {
      const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
      const data = await res.json();
      return data.filter(f => f.type === 'file' && isImage(f.name));
    }

    function renderLogos(files, container, countEl) {
      if (!files.length) {
        container.innerHTML = '<div class="state-msg">No logo files found.</div>';
        countEl.textContent = '0';
        return;
      }
      countEl.textContent = files.length;
      container.innerHTML = '';
      files.forEach((file, i) => {
        const card = document.createElement('div');
        card.className = 'logo-card';
        card.style.animationDelay = `${i * 40}ms`;
        card.innerHTML = `
          <img src="${rawUrl(file)}" alt="${file.name}" loading="lazy" />
          <div class="logo-overlay">
            <div class="logo-overlay-inner">
              <span class="logo-name">${baseName(file.name)}</span>
              <div class="dl-icon">${dlIcon}</div>
            </div>
          </div>
        `;
        card.addEventListener('click', () => forceDownload(rawUrl(file), file.name, card));
        container.appendChild(card);
      });
    }

    function renderPhotos(files, container, countEl) {
      if (!files.length) {
        container.innerHTML = '<div class="state-msg">No image files found.</div>';
        countEl.textContent = '0';
        return;
      }
      countEl.textContent = files.length;
      container.innerHTML = '';
      files.forEach((file, i) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = `${i * 50}ms`;
        card.innerHTML = `
          <img src="${rawUrl(file)}" alt="${file.name}" loading="lazy" />
          <div class="photo-overlay">
            <div class="photo-meta">
              <span class="photo-name">${baseName(file.name)}</span>
              <div class="dl-icon">${dlIcon}</div>
            </div>
          </div>
        `;
        card.addEventListener('click', () => forceDownload(rawUrl(file), file.name, card));
        container.appendChild(card);
      });
    }

    async function init() {
      const logosGrid   = document.getElementById('logos-grid');
      const imagesGrid  = document.getElementById('images-grid');
      const logosCount  = document.getElementById('logos-count');
      const imagesCount = document.getElementById('images-count');

      const [logosResult, imagesResult] = await Promise.allSettled([
        fetchFiles(LOGOS_PATH),
        fetchFiles(IMAGES_PATH)
      ]);

      if (logosResult.status === 'fulfilled') {
        renderLogos(logosResult.value, logosGrid, logosCount);
      } else {
        logosGrid.innerHTML = `<div class="state-msg error">⚠ Could not load logos.<br><small>${logosResult.reason.message}</small></div>`;
      }

      if (imagesResult.status === 'fulfilled') {
        renderPhotos(imagesResult.value, imagesGrid, imagesCount);
      } else {
        imagesGrid.innerHTML = `<div class="state-msg error">⚠ Could not load images.<br><small>${imagesResult.reason.message}</small></div>`;
      }
    }

    async function forceDownload(url, filename, el) {
      el.style.pointerEvents = 'none';
      el.style.opacity = '0.5';
      try {
        const res = await fetch(url);
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
      } catch(e) {
        alert('Download failed. Try right-click → Save As.');
      } finally {
        el.style.pointerEvents = '';
        el.style.opacity = '';
      }
    }

    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav a');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + en
