<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avastha — Materials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --gold:     #c9a96e;
      --gold-dim: #7a6040;
      --text:     #e8e2d9;
      --muted:    #7a7570;
      --radius:   12px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: .5;
    }

    /* HEADER */
    header {
      padding: 64px 40px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
    }
    .header-left { display: flex; flex-direction: column; gap: 12px; }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      line-height: 1;
    }
    .tagline { font-size: 12px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); }

    /* PRESS KIT BTN */
    .press-kit-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .25s, border-color .25s, box-shadow .25s, transform .2s;
      white-space: nowrap;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .press-kit-btn:hover {
      background: rgba(201,169,110,0.08);
      border-color: var(--gold);
      box-shadow: 0 4px 24px rgba(201,169,110,0.15);
      transform: translateY(-2px);
    }
    .press-kit-btn svg { width: 14px; height: 14px; fill: var(--gold); flex-shrink: 0; }

    /* NAV */
    .nav {
      display: flex;
      gap: 24px;
      padding: 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .nav a {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .nav a::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      transition: background .2s;
    }
    .nav a:hover, .nav a.active { color: var(--gold); }
    .nav a:hover::before, .nav a.active::before { background: var(--gold); }

    /* MAIN */
    main { max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }
    section { padding: 60px 0 40px; }
    section + section { border-top: 1px solid var(--border); }
    .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 40px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .section-count {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--gold);
      background: rgba(201,169,110,0.1);
      border: 1px solid rgba(201,169,110,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* LOADING */
    .state-msg { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 13px; letter-spacing: 0.1em; }
    .state-msg.error { color: #c06060; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SHARED GRID */
    .logos-grid, .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* LOGO CARD */
    .logo-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
      background: var(--surface);
      aspect-ratio: 4/3;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
    }
    .logo-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }
    .logo-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 28px;
      transition: transform .4s;
    }
    .logo-card:hover img { transform: scale(1.05); }
    .logo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 50%);
      display: flex;
      align-items: flex-end;
      padding: 14px;
      pointer-events: none;
    }
    .logo-overlay-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      pointer-events: auto;
    }
    .logo-name {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      word-break: break-word;
      flex: 1;
      padding-right: 10px;
    }

    /* PHOTO CARD */
    .photo-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
      background: var(--surface);
      aspect-ratio: 4/3;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
    }
    .photo-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
    .photo-card:hover img { transform: scale(1.04); }
    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      opacity: 0;
      transition: opacity .25s;
    }
    .photo-card:hover .photo-overlay { opacity: 1; }
    .photo-meta { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .photo-name {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      word-break: break-all;
      flex: 1;
    }

    /* DOWNLOAD ICON */
    .dl-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(201,169,110,0.9);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .dl-icon svg { width: 14px; height: 14px; fill: #0d0d0d; }

    /* MEDIA SECTION */
    .media-banner {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px 20px;
      align-items: start;
      padding: 4px 0 8px;
    }
    .media-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      transition: color .25s, transform .25s;
      animation: fadeUp .4s ease both;
    }
    .media-item:hover { color: var(--gold); transform: translateY(-4px); }
    .media-icon-wrap { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
    .media-icon-wrap img {
      width: 72%; height: 72%;
      object-fit: contain;
      filter: grayscale(20%) brightness(0.88);
      transition: filter .25s, transform .25s;
    }
    .media-item:hover .media-icon-wrap img { filter: grayscale(0%) brightness(1.1); transform: scale(1.08); }
    .media-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 40px 20px 32px; flex-direction: column; gap: 24px; }
      .press-kit-btn { align-self: flex-start; }
      .nav { padding: 16px 20px; gap: 16px; flex-wrap: wrap; }
      main { padding: 0 16px 60px; }
      .logos-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .photos-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .photo-card { aspect-ratio: 1; }
      .logo-card  { aspect-ratio: 1; }
      .photo-overlay { opacity: 1; }
      footer { padding: 24px 20px; }
      .media-banner { grid-template-columns: repeat(3, 1fr); gap: 6px 12px; }
      .media-label { font-size: 9px; letter-spacing: 0.1em; }
      #media .section-header { margin-bottom: 24px; }
      section { padding: 40px 0 32px; }
    }
    @media (max-width: 480px) {
      .photos-grid { grid-template-columns: 1fr; }
      .logos-grid  { grid-template-columns: 1fr 1fr; gap: 10px; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="brand">Avastha</div>
      <div class="tagline">Brand Materials &amp; Assets</div>
    </div>
    <a class="press-kit-btn"
       href="https://raw.githubusercontent.com/Avastha/Avastha/main/avastha_presskit.pdf"
       download="avastha_presskit.pdf"
       target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
      </svg>
      Download Press Kit
    </a>
  </header>

  <nav class="nav">
    <a href="#logos" class="active">Logos</a>
    <a href="#images">Photos</a>
    <a href="#media">Media</a>
  </nav>

  <main>

    <section id="logos">
      <div class="section-header">
        <h2 class="section-title">Logos</h2>
        <span class="section-count" id="logos-count">—</span>
      </div>
      <div id="logos-grid" class="logos-grid">
        <div class="state-msg"><div class="spinner"></div><br/>Loading logos…</div>
      </div>
    </section>

    <section id="images">
      <div class="section-header">
        <h2 class="section-title">Photos</h2>
        <span class="section-count" id="images-count">—</span>
      </div>
      <div id="images-grid" class="photos-grid">
        <div class="state-msg"><div class="spinner"></div><br/>Loading photos…</div>
      </div>
    </section>

    <section id="media">
      <div class="section-header">
        <h2 class="section-title">Media</h2>
      </div>
      <div class="media-banner">
        <a class="media-item" href="https://soundcloud.com/avastha_music" target="_blank" rel="noopener" style="animation-delay:0ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/soundcloud.png" alt="SoundCloud" /></div>
          <span class="media-label">SoundCloud</span>
        </a>
        <a class="media-item" href="https://instagram.com/avastha.music" target="_blank" rel="noopener" style="animation-delay:60ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/instagram.png" alt="Instagram" /></div>
          <span class="media-label">Instagram</span>
        </a>
        <a class="media-item" href="https://youtube.com/@Avastha_Music" target="_blank" rel="noopener" style="animation-delay:120ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/youtube.png" alt="YouTube" /></div>
          <span class="media-label">YouTube</span>
        </a>
        <a class="media-item" href="https://facebook.com/Avastha.Music" target="_blank" rel="noopener" style="animation-delay:180ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/facebook.png" alt="Facebook" /></div>
          <span class="media-label">Facebook</span>
        </a>
        <a class="media-item" href="https://chat.whatsapp.com/GThUsW3my9tEqU9ejBl9wa?mode=ac_c" target="_blank" rel="noopener" style="animation-delay:240ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/whatsapp.png" alt="WhatsApp" /></div>
          <span class="media-label">WhatsApp</span>
        </a>
        <a class="media-item" href="mailto:avastha.music@gmail.com" style="animation-delay:300ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/gmail.png" alt="Gmail" /></div>
          <span class="media-label">Gmail</span>
        </a>
      </div>
    </section>

  </main>

  <footer>© Avastha — All rights reserved</footer>

  <script>
    const REPO_OWNER  = 'Avastha';
    const REPO_NAME   = 'Avastha';
    const BRANCH      = 'main';
    const LOGOS_PATH  = 'Materials/Logos';
    const IMAGES_PATH = 'Materials/Images';

    const IMAGE_EXTS = ['.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp','.tiff','.ico'];

    function isImage(n) { return IMAGE_EXTS.some(e => n.toLowerCase().endsWith(e)); }
    function rawUrl(f) { return f.download_url; }
    function baseName(n) { return n.replace(/\.[^/.]+$/, ''); }

    const dlIcon = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>';

    async function fetchFiles(path) {
      const res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path + '?ref=' + BRANCH);
      if (!res.ok) throw new Error('GitHub API error: ' + res.status);
      const data = await res.json();
      return data.filter(function(f) { return f.type === 'file' && isImage(f.name); });
    }

    function renderLogos(files, container, countEl) {
      if (!files.length) {
        container.innerHTML = '<div class="state-msg">No logo files found.</div>';
        countEl.textContent = '0';
        return;
      }
      countEl.textContent = files.length;
      container.innerHTML = '';
      files.forEach(function(file, i) {
        var card = document.createElement('div');
        card.className = 'logo-card';
        card.style.animationDelay = (i * 40) + 'ms';
        card.innerHTML =
          '<img src="' + rawUrl(file) + '" alt="' + file.name + '" loading="lazy" />' +
          '<div class="logo-overlay">' +
            '<div class="logo-overlay-inner">' +
              '<span class="logo-name">' + baseName(file.name) + '</span>' +
              '<div class="dl-icon">' + dlIcon + '</div>' +
            '</div>' +
          '</div>';
        card.addEventListener('click', function() { forceDownload(rawUrl(file), file.name, card); });
        container.appendChild(card);
      });
    }

    function renderPhotos(files, container, countEl) {
      if (!files.length) {
        container.innerHTML = '<div class="state-msg">No image files found.</div>';
        countEl.textContent = '0';
        return;
      }
      countEl.textContent = files.length;
      container.innerHTML = '';
      files.forEach(function(file, i) {
        var card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = (i * 50) + 'ms';
        card.innerHTML =
          '<img src="' + rawUrl(file) + '" alt="' + file.name + '" loading="lazy" />' +
          '<div class="photo-overlay">' +
            '<div class="photo-meta">' +
              '<span class="photo-name">' + baseName(file.name) + '</span>' +
              '<div class="dl-icon">' + dlIcon + '</div>' +
            '</div>' +
          '</div>';
        card.addEventListener('click', function() { forceDownload(rawUrl(file), file.name, card); });
        container.appendChild(card);
      });
    }

    async function init() {
      var logosGrid   = document.getElementById('logos-grid');
      var imagesGrid  = document.getElementById('images-grid');
      var logosCount  = document.getElementById('logos-count');
      var imagesCount = document.getElementById('images-count');

      var results = await Promise.allSettled([fetchFiles(LOGOS_PATH), fetchFiles(IMAGES_PATH)]);

      if (results[0].status === 'fulfilled') {
        renderLogos(results[0].value, logosGrid, logosCount);
      } else {
        logosGrid.innerHTML = '<div class="state-msg error">Could not load logos: ' + results[0].reason.message + '</div>';
      }

      if (results[1].status === 'fulfilled') {
        renderPhotos(results[1].value, imagesGrid, imagesCount);
      } else {
        imagesGrid.innerHTML = '<div class="state-msg error">Could not load images: ' + results[1].reason.message + '</div>';
      }
    }

    async function forceDownload(url, filename, el) {
      el.style.pointerEvents = 'none';
      el.style.opacity = '0.5';
      try {
        var res = await fetch(url);
        var blob = await res.blob();
        var blobUrl = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 5000);
      } catch(e) {
        alert('Download failed. Try right-click and Save As.');
      } finally {
        el.style.pointerEvents = '';
        el.style.opacity = '';
      }
    }

    var sections = document.querySelectorAll('section[id]');
    var navLinks = document.querySelectorAll('.nav a');
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          navLinks.forEach(function(l) {
            l.classList.toggle('active', l.getAttribute('href') === '#' + entry.target.id);
          });
        }
      });
    }, { threshold: 0.4 });
    sections.forEach(function(s) { observer.observe(s); });

    init();
  </script>
</body>
</html>
