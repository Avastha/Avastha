<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avastha — Materials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --gold:     #c9a96e;
      --gold-dim: #7a6040;
      --text:     #e8e2d9;
      --muted:    #7a7570;
      --radius:   12px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: .5;
    }

    /* ── HEADER ── */
    header {
      padding: 64px 40px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
    }
    .header-left { display: flex; flex-direction: column; gap: 12px; }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      line-height: 1;
    }
    .tagline { font-size: 12px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); }

    /* ── PRESS KIT ── */
    .press-kit-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .25s, border-color .25s, box-shadow .25s, transform .2s;
      white-space: nowrap;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .press-kit-btn:hover {
      background: rgba(201,169,110,0.08);
      border-color: var(--gold);
      box-shadow: 0 4px 24px rgba(201,169,110,0.15);
      transform: translateY(-2px);
    }
    .press-kit-btn svg { width: 14px; height: 14px; fill: var(--gold); flex-shrink: 0; }

    /* ── NAV ── */
    .nav {
      display: flex;
      gap: 24px;
      padding: 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .nav a {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .nav a::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      transition: background .2s;
    }
    .nav a:hover, .nav a.active { color: var(--gold); }
    .nav a:hover::before, .nav a.active::before { background: var(--gold); }

    /* ── MAIN / SECTIONS ── */
    main { max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }
    section { padding: 60px 0 40px; }
    section + section { border-top: 1px solid var(--border); }
    .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 40px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── LOADING ── */
    .state-msg { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 13px; letter-spacing: 0.1em; }
    .state-msg.error { color: #c06060; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOGO GRID (desktop) ── */
    .logos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* Logo card */
    .logo-card {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
      background: transparent;
    }
    .logo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
    }

    /* Name strip */
    .logo-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-name {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .logo-card:hover .logo-name { color: var(--gold); }

    /* Download icon */
    .dl-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(201,169,110,0.15);
      border: 1px solid rgba(201,169,110,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .logo-card:hover .dl-icon {
      background: rgba(201,169,110,0.9);
      border-color: var(--gold);
    }
    .dl-icon svg { width: 12px; height: 12px; fill: var(--gold); transition: fill .2s; }
    .logo-card:hover .dl-icon svg { fill: #0d0d0d; }

    /* Image area */
    .logo-img-area {
      background: var(--surface);
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .logo-img-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      padding: 24px;
      transition: transform .4s;
      display: block;
    }
    .logo-card:hover .logo-img-area img { transform: scale(1.05); }

    /* ── LOGO LIST (mobile) ── */
    .logos-list { display: none; flex-direction: column; gap: 1px; }
    .logo-list-item {
      display: flex;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      transition: background .2s, box-shadow .2s;
      animation: fadeUp .35s ease both;
      min-height: 72px;
    }
    .logo-list-item:active { background: #1e1e1e; }

    /* LEFT: name — clickable, opens preview */
    .logo-list-info {
      flex: 1;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      cursor: pointer;
      min-width: 0;
    }
    .logo-list-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(12px, 3.8vw, 15px);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.35;
      transition: color .2s;
    }
    .logo-list-info:hover .logo-list-name,
    .logo-list-info:active .logo-list-name { color: var(--gold); }

    /* MIDDLE: thumbnail — also clickable, opens preview */
    .logo-list-thumb {
      width: 90px;
      flex-shrink: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      cursor: pointer;
    }
    .logo-list-thumb img {
      max-width: 76px;
      max-height: 54px;
      object-fit: contain;
      padding: 6px;
    }

    /* RIGHT: download */
    .logo-list-dl {
      width: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
    }
    .logo-list-dl:hover,
    .logo-list-dl:active { background: rgba(201,169,110,0.15); }
    .logo-list-dl svg { width: 14px; height: 14px; fill: var(--gold-dim); transition: fill .2s; }
    .logo-list-dl:hover svg,
    .logo-list-dl:active svg { fill: var(--gold); }

    /* ── PHOTOS GRID ── */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .photo-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
      background: var(--surface);
      aspect-ratio: 4/3;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
    }
    .photo-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
    .photo-card:hover img { transform: scale(1.04); }
    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      opacity: 0;
      transition: opacity .25s;
    }
    .photo-card:hover .photo-overlay { opacity: 1; }
    .photo-meta { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .photo-name {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      word-break: break-all;
      flex: 1;
    }
    .photo-dl-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(201,169,110,0.9);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .photo-dl-icon svg { width: 14px; height: 14px; fill: #0d0d0d; }

    /* ── MEDIA SECTION ── */
    .media-banner {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px 20px;
      align-items: start;
      padding: 4px 0 8px;
    }
    .media-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      transition: color .25s, transform .25s;
      animation: fadeUp .4s ease both;
    }
    .media-item:hover { color: var(--gold); transform: translateY(-4px); }
    .media-icon-wrap { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
    .media-icon-wrap img {
      width: 72%; height: 72%;
      object-fit: contain;
      filter: grayscale(20%) brightness(0.88);
      transition: filter .25s, transform .25s;
    }
    .media-item:hover .media-icon-wrap img { filter: grayscale(0%) brightness(1.1); transform: scale(1.08); }
    .media-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 20px 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .lightbox::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 0;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    /* Floating name — above the card */
    .lightbox-name {
      position: relative;
      z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8e2d9;
      text-align: center;
      white-space: normal;
      word-break: break-word;
      max-width: 88vw;
      line-height: 1.4;
    }

    /* Card */
    .lightbox-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      transform: scale(0.93);
      transition: transform .3s;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 32px 100px rgba(0,0,0,.95);
      width: 88vw;
      max-width: 480px;
    }
    .lightbox.open .lightbox-inner { transform: scale(1); }

    /* Canvas — color set exclusively via JS */
    .lightbox-canvas {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
      display: block;
      transition: opacity .15s ease;
    }

    /* Footer — buttons only */
    .lightbox-footer {
      background: #111111;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .lb-bg-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform .2s;
      display: block;
    }
    .lb-bg-btn:hover { transform: scale(1.25); }
    .lb-bg-btn.active {
      outline: 2.5px solid #ffffff;
      outline-offset: 2.5px;
    }
    .lightbox-close {
      position: fixed; top: 20px; right: 20px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s;
      z-index: 9001;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.15); }
    .lightbox-close svg { width: 16px; height: 16px; stroke: #e8e2d9; }

    /* Prev / Next arrows */
    .lb-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #e8e2d9;
      transition: background .2s, transform .2s;
      z-index: 2;
      flex-shrink: 0;
    }
    .lb-arrow:hover { background: rgba(0,0,0,0.75); }
    .lb-arrow svg { width: 18px; height: 18px; }
    .lb-arrow-prev { left: 10px; }
    .lb-arrow-next { right: 10px; }
    .lb-arrow:disabled { opacity: 0.2; cursor: default; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .footer-site-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.25em;
      border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 2px;
      transition: color .2s, border-color .2s;
    }
    .footer-site-link:hover {
      color: var(--text);
      border-color: var(--text);
    }
    .footer-site-link svg { width: 11px; height: 11px; fill: currentColor; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 40px 20px 32px; flex-direction: column; gap: 24px; }
      .press-kit-btn { align-self: flex-start; }
      .nav { padding: 16px 20px; gap: 16px; flex-wrap: wrap; }
      main { padding: 0 16px 60px; }

      /* Switch logos to list view on mobile */
      .logos-grid { display: none; }
      .logos-list { display: flex; }

      .photos-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .photo-card { aspect-ratio: 1; }
      .photo-overlay { opacity: 1; }
      footer { padding: 24px 20px; }
      .media-banner { grid-template-columns: repeat(3, 1fr); gap: 6px 12px; }
      .media-label { font-size: 9px; letter-spacing: 0.1em; }
      section { padding: 40px 0 32px; }
    }
    @media (max-width: 480px) {
      .photos-grid { grid-template-columns: 1fr; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DOWNLOAD ALL ── */
    .download-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, border-color .2s, opacity .2s;
      white-space: nowrap;
      margin-left: 16px;
    }
    .download-all-btn:hover { background: rgba(201,169,110,0.08); border-color: var(--gold); }
    .download-all-btn:disabled { opacity: 0.4; cursor: default; }
    .download-all-btn svg { width: 12px; height: 12px; fill: var(--gold); flex-shrink: 0; }
    .download-all-btn .btn-spinner {
      width: 11px; height: 11px;
      border: 1.5px solid var(--gold-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="brand">Avastha</div>
      <div class="tagline">Brand Materials &amp; Assets</div>
    </div>
    <a class="press-kit-btn"
       href="https://raw.githubusercontent.com/Avastha/Avastha/main/avastha_presskit.pdf"
       download="avastha_presskit.pdf"
       target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
      </svg>
      Download Press Kit
    </a>
  </header>

  <nav class="nav">
    <a href="#logos" class="active">Logos</a>
    <a href="#images">Photos</a>
    <a href="#media">Media</a>
  </nav>

  <main>

    <section id="logos">
      <div class="section-header">
        <h2 class="section-title">Logos</h2>
        <button class="download-all-btn" id="dl-all-logos" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>
          Download All
        </button>
      </div>
      <!-- Desktop grid -->
      <div id="logos-grid" class="logos-grid">
        <div class="state-msg"><div class="spinner"></div><br/>Loading logos…</div>
      </div>
      <!-- Mobile list -->
      <div id="logos-list" class="logos-list">
        <div class="state-msg"><div class="spinner"></div><br/>Loading logos…</div>
      </div>
    </section>

    <section id="images">
      <div class="section-header">
        <h2 class="section-title">Photos</h2>
        <button class="download-all-btn" id="dl-all-photos" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>
          Download All
        </button>
      </div>
      <div id="images-grid" class="photos-grid">
        <div class="state-msg"><div class="spinner"></div><br/>Loading photos…</div>
      </div>
    </section>

    <section id="media">
      <div class="section-header">
        <h2 class="section-title">Media</h2>
      </div>
      <div class="media-banner">
        <a class="media-item" href="https://soundcloud.com/avastha_music" target="_blank" rel="noopener" style="animation-delay:0ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/soundcloud.png" alt="SoundCloud" /></div>
          <span class="media-label">SoundCloud</span>
        </a>
        <a class="media-item" href="https://instagram.com/avastha.music" target="_blank" rel="noopener" style="animation-delay:60ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/instagram.png" alt="Instagram" /></div>
          <span class="media-label">Instagram</span>
        </a>
        <a class="media-item" href="https://youtube.com/@Avastha_Music" target="_blank" rel="noopener" style="animation-delay:120ms">
          <div class="media-icon-wrap"><img src="https://raw.githubusercontent.com/Avastha/Avastha/main/youtube.png" alt="YouTube" /></div>
          <span class="media-label">YouTube</span>
        </a>
        <a class="media-item" href="https://facebook.com/Avastha.Music" target="_blank" rel="noopener" style="animation-delay:180ms">

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    var REPO_OWNER  = 'Avastha';
    var REPO_NAME   = 'Avastha';
    var BRANCH      = 'main';
    var LOGOS_PATH  = 'Materials/Logos';
    var IMAGES_PATH = 'Materials/Images';

    var IMAGE_EXTS = ['.png','.jpg','.jpeg','.gif','.webp','.svg','.bmp','.tiff','.ico'];

    function isImage(n) { return IMAGE_EXTS.some(function(e) { return n.toLowerCase().endsWith(e); }); }
    function rawUrl(f) { return f.download_url; }
    function baseName(n) { return n.replace(/\.[^/.]+$/, '').replace(/_/g, ' '); }
    var dlIcon = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>';

    function fetchFiles(path) {
      return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + path + '?ref=' + BRANCH)
        .then(function(res) {
          if (!res.ok) throw new Error('GitHub API error: ' + res.status);
          return res.json();
        })
        .then(function(data) {
          return data.filter(function(f) { return f.type === 'file' && isImage(f.name); });
        });
    }

    function renderLogos(files, gridContainer, listContainer) {
      if (!files.length) {
        var empty = '<div class="state-msg">No logo files found.</div>';
        gridContainer.innerHTML = empty;
        listContainer.innerHTML = empty;
        return;
      }

      // Build shared lightbox file list
      var lbFileList = files.map(function(f) {
        return { url: rawUrl(f), name: baseName(f.name), filename: f.name };
      });

      // Desktop grid
      gridContainer.innerHTML = '';
      files.forEach(function(file, i) {
        var card = document.createElement('div');
        card.className = 'logo-card';
        card.style.animationDelay = (i * 40) + 'ms';
        card.innerHTML =
          '<div class="logo-label">' +
            '<span class="logo-name">' + baseName(file.name) + '</span>' +
            '<div class="dl-icon">' + dlIcon + '</div>' +
          '</div>' +
          '<div class="logo-img-area">' +
            '<img src="' + rawUrl(file) + '" alt="' + file.name + '" loading="lazy" />' +
          '</div>';

        // Image area → preview with full list
        (function(idx) {
          card.querySelector('.logo-img-area').addEventListener('click', function(e) {
            e.stopPropagation();
            openLightbox(lbFileList, idx);
          });
        })(i);
        // Download icon → download
        card.querySelector('.dl-icon').addEventListener('click', function(e) {
          e.stopPropagation();
          forceDownload(rawUrl(file), file.name, card.querySelector('.dl-icon'));
        });

        gridContainer.appendChild(card);
      });

      // Mobile list
      listContainer.innerHTML = '';
      files.forEach(function(file, i) {
        var item = document.createElement('div');
        item.className = 'logo-list-item';
        item.style.animationDelay = (i * 40) + 'ms';
        item.innerHTML =
          '<div class="logo-list-info">' +
            '<div class="logo-list-name">' + baseName(file.name) + '</div>' +
          '</div>' +
          '<div class="logo-list-thumb">' +
            '<img src="' + rawUrl(file) + '" alt="' + file.name + '" loading="lazy" />' +
          '</div>' +
          '<div class="logo-list-dl">' + dlIcon + '</div>';

        // Name + thumb → preview with full list
        (function(idx) {
          item.querySelector('.logo-list-info').addEventListener('click', function(e) {
            e.stopPropagation();
            openLightbox(lbFileList, idx);
          });
          item.querySelector('.logo-list-thumb').addEventListener('click', function(e) {
            e.stopPropagation();
            openLightbox(lbFileList, idx);
          });
        })(i);

        // Download icon → download
        item.querySelector('.logo-list-dl').addEventListener('click', function(e) {
          e.stopPropagation();
          forceDownload(rawUrl(file), file.name, item.querySelector('.logo-list-dl'));
        });

        listContainer.appendChild(item);
      });
    }

    /* ── Lightbox ── */
    var lb       = document.getElementById('lightbox');
    var lbImg    = document.getElementById('lightbox-img');
    var lbName   = document.getElementById('lightbox-name');
    var lbClose  = document.getElementById('lightbox-close');
    var lbCanvas = document.getElementById('lightbox-canvas');
    var lbBgBtns = document.querySelectorAll('.lb-bg-btn');
    var lbDlBtn  = document.getElementById('lightbox-dl');
    var lbPrev   = document.getElementById('lb-prev');
    var lbNext   = document.getElementById('lb-next');

    var lbFiles = [];
    var lbIndex = 0;

    lbDlBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var f = lbFiles[lbIndex];
      if (f) forceDownload(f.url, f.filename, lbDlBtn);
    });

    lbPrev.addEventListener('click', function(e) {
      e.stopPropagation();
      if (lbIndex > 0) showAtIndex(lbIndex - 1);
    });
    lbNext.addEventListener('click', function(e) {
      e.stopPropagation();
      if (lbIndex < lbFiles.length - 1) showAtIndex(lbIndex + 1);
    });

    function showAtIndex(idx) {
      lbIndex = idx;
      var f = lbFiles[idx];
      lbImg.style.opacity = '0';
      setTimeout(function() {
        lbImg.src = f.url;
        lbName.textContent = f.name;
        lbCurrentFile = { url: f.url, name: f.filename };
        lbImg.style.opacity = '1';
      }, 150);
      lbPrev.disabled = (idx === 0);
      lbNext.disabled = (idx === lbFiles.length - 1);
    }

    var lbCurrentFile = { url: '', name: '' };

    function setLbBg(color) {
      lbCanvas.setAttribute('style', 'background-color:' + color);
      lbBgBtns.forEach(function(b) {
        b.classList.toggle('active', b.dataset.bg.toLowerCase() === color.toLowerCase());
      });
    }

    lbBgBtns.forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        setLbBg(btn.dataset.bg);
      });
    });

    function openLightbox(files, index) {
      lbFiles = files;
      showAtIndex(index);
      setLbBg('#aaaaaa');
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      history.pushState({ lightbox: true }, '');
    }
    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }
    lbClose.addEventListener('click', function() { history.back(); });
    lb.addEventListener('click', function(e) { if (e.target === lb) history.back(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') history.back();
      if (e.key === 'ArrowLeft'  && lbIndex > 0) showAtIndex(lbIndex - 1);
      if (e.key === 'ArrowRight' && lbIndex < lbFiles.length - 1) showAtIndex(lbIndex + 1);
    });
    window.addEventListener('popstate', function() {
      if (lb.classList.contains('open')) closeLightbox();
    });

    function renderPhotos(files, container) {
      if (!files.length) {
        container.innerHTML = '<div class="state-msg">No image files found.</div>';
        return;
      }
      container.innerHTML = '';
      files.forEach(function(file, i) {
        var card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = (i * 50) + 'ms';
        card.innerHTML =
          '<img src="' + rawUrl(file) + '" alt="' + file.name + '" loading="lazy" />' +
          '<div class="photo-overlay">' +
            '<div class="photo-meta">' +
              '<span class="photo-name">' + baseName(file.name) + '</span>' +
              '<div class="photo-dl-icon">' + dlIcon + '</div>' +
            '</div>' +
          '</div>';
        card.addEventListener('click', function() { forceDownload(rawUrl(file), file.name, card); });
        container.appendChild(card);
      });
    }

    function init() {
      var logosGrid   = document.getElementById('logos-grid');
      var logosList   = document.getElementById('logos-list');
      var imagesGrid  = document.getElementById('images-grid');

      Promise.allSettled([fetchFiles(LOGOS_PATH), fetchFiles(IMAGES_PATH)])
        .then(function(results) {
          if (results[0].status === 'fulfilled') {
            renderLogos(results[0].value, logosGrid, logosList);
            wireDownloadAll('dl-all-logos', results[0].value, 'Avastha_Logos.zip');
          } else {
            var err = '<div class="state-msg error">Could not load logos: ' + results[0].reason.message + '</div>';
            logosGrid.innerHTML = err;
            logosList.innerHTML = err;
          }
          if (results[1].status === 'fulfilled') {
            renderPhotos(results[1].value, imagesGrid);
            wireDownloadAll('dl-all-photos', results[1].value, 'Avastha_Photos.zip');
          } else {
            imagesGrid.innerHTML = '<div class="state-msg error">Could not load images: ' + results[1].reason.message + '</div>';
          }
        });
    }

    /* ── Pure-JS ZIP builder (no external lib) ── */
    function makeCrcTable() {
      var t = new Uint32Array(256);
      for (var i = 0; i < 256; i++) {
        var c = i;
        for (var j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
        t[i] = c;
      }
      return t;
    }
    var CRC_TABLE = makeCrcTable();
    function crc32(buf) {
      var c = 0xFFFFFFFF;
      for (var i = 0; i < buf.length; i++) c = CRC_TABLE[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
      return (c ^ 0xFFFFFFFF) >>> 0;
    }
    function u16(n) { return [n & 0xFF, (n >> 8) & 0xFF]; }
    function u32(n) { return [n & 0xFF, (n >> 8) & 0xFF, (n >> 16) & 0xFF, (n >> 24) & 0xFF]; }
    function strBytes(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i++) {
        var c = s.charCodeAt(i);
        if (c < 128) bytes.push(c);
        else if (c < 2048) { bytes.push(0xC0|(c>>6)); bytes.push(0x80|(c&63)); }
        else { bytes.push(0xE0|(c>>12)); bytes.push(0x80|((c>>6)&63)); bytes.push(0x80|(c&63)); }
      }
      return bytes;
    }
    function buildZip(entries) {
      // entries: [{name, data: Uint8Array}]
      var locals = [], centrals = [], offset = 0;
      entries.forEach(function(e) {
        var name = strBytes(e.name);
        var data = e.data;
        var crc  = crc32(data);
        var size = data.length;
        var local = [].concat(
          [0x50,0x4B,0x03,0x04], u16(20), u16(0), u16(0),
          u16(0), u16(0), u32(crc), u32(size), u32(size),
          u16(name.length), u16(0), name
        );
        var localArr = new Uint8Array(local.length + size);
        localArr.set(local);
        localArr.set(data, local.length);
        locals.push(localArr);

        var central = [].concat(
          [0x50,0x4B,0x01,0x02], u16(20), u16(20), u16(0), u16(0),
          u16(0), u16(0), u32(crc), u32(size), u32(size),
          u16(name.length), u16(0), u16(0), u16(0), u16(0),
          u32(0), u32(offset), name
        );
        centrals.push(central);
        offset += localArr.length;
      });
      var cdFlat = [].concat.apply([], centrals);
      var eocd = [].concat(
        [0x50,0x4B,0x05,0x06], u16(0), u16(0),
        u16(entries.length), u16(entries.length),
        u32(cdFlat.length), u32(offset), u16(0)
      );
      var total = new Uint8Array(offset + cdFlat.length + eocd.length);
      var pos = 0;
      locals.forEach(function(l) { total.set(l, pos); pos += l.length; });
      total.set(cdFlat, pos); pos += cdFlat.length;
      total.set(eocd, pos);
      return new Blob([total], { type: 'application/zip' });
    }

    function wireDownloadAll(btnId, files, zipName) {
      var btn = document.getElementById(btnId);
      if (!files.length) return;
      btn.disabled = false;
      btn.addEventListener('click', function() {
        btn.disabled = true;
        btn.innerHTML = '<div class="btn-spinner"></div> Zipping\u2026';
        var fetches = files.map(function(f) {
          return fetch(f.download_url)
            .then(function(res) { return res.arrayBuffer(); })
            .then(function(buf) { return { name: f.name, data: new Uint8Array(buf) }; });
        });
        Promise.all(fetches)
          .then(function(entries) {
            var blob = buildZip(entries);
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = zipName;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(function() { URL.revokeObjectURL(url); }, 8000);
          })
          .catch(function() { alert('Zip failed. Please try again.'); })
          .finally(function() {
            btn.disabled = false;
            btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/><\/svg> Download All';
          });
      });
    }

    function forceDownload(url, filename, el) {
      el.style.pointerEvents = 'none';
      el.style.opacity = '0.5';
      fetch(url)
        .then(function(res) { return res.blob(); })
        .then(function(blob) {
          var blobUrl = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 5000);
        })
        .catch(function() { alert('Download failed. Try right-click and Save As.'); })
        .finally(function() { el.style.pointerEvents = ''; el.style.opacity = ''; });
    }

    var sections = document.querySelectorAll('section[id]');
    var navLinks = document.querySelectorAll('.nav a');
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          navLinks.forEach(function(l) {
            l.classList.toggle('active', l.getAttribute('href') === '#' + entry.target.id);
          });
        }
      });
    }, { threshold: 0.4 });
    sections.forEach(function(s) { observer.observe(s); });

    init();
  </script>
